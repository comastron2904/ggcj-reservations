<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GGCJ 특별실 예약</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --border2: #cccac0;
    --text: #1a1a18;
    --text2: #6b6a64;
    --text3: #9e9d97;
    --accent: #e24329;
    --accent-dark: #b53a2a;
    --accent-bg: #fdf0ee;
    --accent-text: #8a2a1c;
    --success: #2a7a4b;
    --success-bg: #eaf5ee;
    --danger: #b53a2a;
    --danger-bg: #fdf0ee;
    --reserved: #c47c10;
    --reserved-bg: #fdf4e7;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }

  .site-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; height: 56px; position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow); }
  .site-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
  .site-title span { color: var(--accent); }

  .container { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem; transition: max-width 0.2s; }
  .container.science-room { max-width: 980px; }

  .floor-tabs { display: flex; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 4px; gap: 4px; margin-bottom: 1rem; box-shadow: var(--shadow); }
  .floor-tab { flex: 1; padding: 9px; border: none; border-radius: var(--radius-sm); background: transparent; color: var(--text2); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; }
  .floor-tab:hover { background: var(--surface2); color: var(--text); }
  .floor-tab.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(226,67,41,0.3); }

  .room-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
  .room-chip { padding: 7px 16px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); color: var(--text2); font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow); }
  .room-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
  .room-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .schedule-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
  .schedule-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--surface2); flex-wrap: wrap; gap: 8px; }
  .schedule-room-name { font-size: 15px; font-weight: 700; }
  .date-nav { display: flex; align-items: center; gap: 6px; }
  .date-btn { width: 30px; height: 30px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: inherit; }
  .date-btn:hover { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
  .date-label { font-size: 13px; font-weight: 600; color: var(--text); min-width: 160px; text-align: center; font-family: 'DM Mono', monospace; }

  /* ── Weekly table view ── */
  .week-table-wrap { overflow-x: auto; padding: 0; }
  .week-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .week-table th, .week-table td { border: 1px solid var(--border); text-align: center; padding: 0; }
  .week-table thead th { background: var(--surface2); font-weight: 700; font-size: 12px; padding: 7px 4px; position: sticky; top: 0; z-index: 2; }
  .week-table thead th.time-col { width: 58px; min-width: 58px; }
  .week-table thead th.today-col { background: var(--accent-bg); color: var(--accent); }
  .week-table .time-cell { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); font-weight: 500; padding: 6px 4px; background: var(--surface2); white-space: normal; text-align: center; line-height: 1.5; }
  .week-cell { width: 100%; height: 100%; min-height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 4px 2px; cursor: pointer; transition: background 0.12s; }
  .week-cell:hover { filter: brightness(0.95); }
  .week-cell.free { background: var(--surface); }
  .week-cell.free:hover { background: var(--accent-bg); }
  .week-cell.reserved { background: var(--reserved-bg); cursor: default; }
  .week-cell.is-class { background: #eef2ff; cursor: not-allowed; }
  .week-cell.today-col { background: #fffaf9; }
  .week-cell.today-col.free:hover { background: var(--accent-bg); }
  .week-cell-name { font-size: 11px; font-weight: 600; color: var(--reserved); max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .week-cell-label { font-size: 10px; color: var(--text3); }
  .week-cell.is-class .week-cell-label { color: #4338ca; font-weight: 600; }
  .week-cell.reserved .week-cell-label { color: var(--reserved); }
  .week-cell-dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-free { background: #ccc; }
  .dot-reserved { background: var(--reserved); }
  .dot-class { background: #818cf8; }

  /* ── 복수 선택 모드 ── */
  .week-cell.selected { background: #dbeafe !important; outline: 2px solid #3b82f6; outline-offset: -2px; }
  .week-cell.selected .week-cell-dot { background: #3b82f6; }
  .multi-bar { position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%); z-index: 100; background: #1e293b; color: #fff; border-radius: 999px; padding: 10px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.25); font-size: 13px; font-weight: 600; white-space: nowrap; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  .multi-bar-count { background: #3b82f6; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .multi-bar-btn { padding: 6px 14px; border-radius: 999px; border: none; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; }
  .multi-bar-confirm { background: #3b82f6; color: #fff; }
  .multi-bar-confirm:hover { background: #2563eb; }
  .multi-bar-cancel { background: rgba(255,255,255,0.15); color: #fff; }
  .multi-bar-cancel:hover { background: rgba(255,255,255,0.25); }
  .select-mode-btn { padding: 5px 12px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text2); font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
  .select-mode-btn:hover { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; }
  .select-mode-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .select-mode-btn.cancel-mode { border-color: var(--reserved); color: var(--reserved); }
  .select-mode-btn.cancel-mode:hover { background: var(--reserved-bg); }
  .select-mode-btn.cancel-mode.active { background: var(--danger); color: #fff; border-color: var(--danger); }
  .excel-btn { padding: 6px 14px; border: 1px solid #16a34a; border-radius: 999px; background: var(--surface); color: #16a34a; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .excel-btn:hover { background: #16a34a; color: #fff; }
  .excel-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .import-btn { border-color: #2563eb; color: #2563eb; }
  .import-btn:hover { background: #2563eb; color: #fff; }
  .week-cell.cancel-selected { background: #fee2e2 !important; outline: 2px solid var(--danger); outline-offset: -2px; }
  .multi-bar.cancel-bar { background: #7f1d1d; }
  .multi-bar-confirm.cancel-confirm { background: var(--danger); }
  .multi-bar-confirm.cancel-confirm:hover { background: #8a2a1c; }

  /* legacy (kept for modal reuse) */
  .slots-wrap { padding: 8px; }
  .slot-row { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--radius-sm); margin-bottom: 3px; transition: background 0.12s; border: 1px solid transparent; }
  .slot-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; flex-shrink: 0; }
  .badge-free { background: var(--surface2); color: var(--text3); }
  .badge-reserved { background: var(--reserved-bg); color: var(--reserved); border: 1px solid #f0d5a0; }
  .badge-mine { background: var(--success-bg); color: var(--success); border: 1px solid #aad8be; }
  .slot-btn { padding: 5px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); background: var(--surface); color: var(--text2); }
  .slot-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .slot-btn.cancel-btn { border-color: #f0d5a0; color: var(--reserved); background: var(--reserved-bg); }
  .slot-btn.cancel-btn:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
  .slot-btn:disabled { opacity: 0.4; cursor: not-allowed; background: var(--surface2); }
  .badge-class { background: #eef2ff; color: #4338ca; border: 1px solid #c7d2fe; }

  /* 취소 범위 선택 */
  .cancel-scope { display: flex; gap: 6px; margin-bottom: 12px; }
  .cancel-scope-btn { flex: 1; padding: 8px 4px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text2); font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; text-align: center; }
  .cancel-scope-btn:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }
  .cancel-scope-btn.active { background: var(--danger); color: #fff; border-color: var(--danger); }
  .cancel-scope-desc { font-size: 11px; color: var(--text3); background: var(--surface2); border-radius: var(--radius-sm); padding: 7px 10px; margin-bottom: 12px; line-height: 1.6; }
  .slot-btn.class-btn { border-color: #c7d2fe; color: #4338ca; background: #eef2ff; cursor: not-allowed; }

  .state-box { text-align: center; padding: 3rem 1rem; color: var(--text3); }
  .loading-bar { height: 3px; background: linear-gradient(90deg, var(--accent-bg), var(--accent), var(--accent-bg)); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(15,15,12,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; backdrop-filter: blur(2px); }
  .modal-box { background: var(--surface); border-radius: 14px; padding: 1.75rem; width: 100%; max-width: 380px; box-shadow: var(--shadow-md); border: 1px solid var(--border); animation: modalIn 0.18s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes modalIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 1.25rem; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.5px; text-transform: uppercase; }
  .field input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); transition: border-color 0.15s; }
  .field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(226,67,41,0.1); }
  .field input[readonly] { background: var(--surface2); }
  .field-hint { font-size: 11px; color: var(--text3); margin-top: 4px; line-height: 1.6; }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-primary { flex: 1; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { flex: 1; padding: 10px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--danger) !important; }
  .btn-danger:hover { background: #8a2a1c !important; }
  .alert { padding: 10px 12px; border-radius: var(--radius-sm); font-size: 13px; margin-top: 12px; font-weight: 500; }
  .alert-error { background: var(--danger-bg); color: var(--danger); border: 1px solid #f4bdb3; }
  .alert-success { background: var(--success-bg); color: var(--success); border: 1px solid #aad8be; }

  .repeat-select { display: flex; gap: 6px; margin-bottom: 14px; }
  .repeat-btn { flex: 1; padding: 8px 4px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text2); font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; text-align: center; }
  .repeat-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
  .repeat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .repeat-desc { font-size: 11px; color: var(--text3); background: var(--surface2); border-radius: var(--radius-sm); padding: 7px 10px; margin-bottom: 4px; line-height: 1.6; }
  .site-footer { text-align: center; padding: 1.5rem; font-size: 12px; color: var(--text3); border-top: 1px solid var(--border); margin-top: 2rem; }

  @media (max-width: 480px) {
    .site-header { padding: 0 1rem; }
    .date-label { min-width: 130px; font-size: 12px; }
    .slot-row { padding: 8px; gap: 7px; }
    .slot-time { width: 48px; font-size: 12px; }
  }
</style>
</head>

function isClassHour(room, date, hour) {
  const day = date.getDay();
  return !!(CLASS_HOURS[room]?.[day]?.includes(hour));
}

function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDisplay(d) { return `${d.getMonth()+1}월 ${d.getDate()}일 (${DAY_KO[d.getDay()]})`; }

// ===================== Supabase API =====================
function sbHeaders() {
  return {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  };
}

async function sbGetReservations(room, date) {
  const dateStr = fmtDate(date);
  const url = `${SUPABASE_URL}/rest/v1/reservations?room=eq.${encodeURIComponent(room)}&date=eq.${dateStr}&select=*`;
  try {
    const r = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function sbInsert(room, date, hour, name, pwHash, reason) {
  const url = `${SUPABASE_URL}/rest/v1/reservations`;
  const body = { id: `${room}__${fmtDate(date)}__${hour}`, room, date: fmtDate(date), hour, name, pw_hash: pwHash, reason: reason || '' };
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    // resolution=ignore-duplicates: 같은 id(PK)가 이미 존재하면 삽입 안 하고 넘어감
    'Prefer': 'return=minimal,resolution=ignore-duplicates'
  };
  try {
    const r = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
    if (!r.ok) {
      const errText = await r.text();
      console.error(`sbInsert 실패 [${r.status}]:`, errText);
      return false;
    }
    return true;
  } catch(e) { console.error('sbInsert 예외:', e); return false; }
}

// 동일 방·시간대의 예약 전체 조회 (반복 취소용)
async function sbGetReservationsByHour(room, hour) {
  const url = `${SUPABASE_URL}/rest/v1/reservations?room=eq.${encodeURIComponent(room)}&hour=eq.${hour}&select=id,date,name,pw_hash`;
  try {
    const r = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function sbDelete(room, date, hour) {
  const id = `${room}__${fmtDate(date)}__${hour}`;
  const url = `${SUPABASE_URL}/rest/v1/reservations?id=eq.${encodeURIComponent(id)}`;
  try {
    const r = await fetch(url, { method: 'DELETE', headers: sbHeaders() });
    if (!r.ok) {
      const errText = await r.text();
      console.error(`sbDelete 실패 [${r.status}]:`, errText);
    }
    return r.ok || r.status === 204;
  } catch(e) { console.error('sbDelete 예외:', e); return false; }
}

// 해당 주의 월요일 기준일 반환
function getWeekMonday(d) {
  const day = d.getDay(); // 0=일, 1=월 ...
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  mon.setHours(0,0,0,0);
  return mon;
}

// 주간 7일 배열 반환
function getWeekDays(monday) {
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

async function loadRoom(room) {
  renderLoading();
  const monday = getWeekMonday(state.date);
  const days = getWeekDays(monday);
  const dataMap = {};
  await Promise.all(days.map(async d => {
    const rows = await sbGetReservations(room, d);
    if (rows) rows.forEach(r => { dataMap[r.id] = { name: r.name, pwHash: r.pw_hash, reason: r.reason || '' }; });
  }));
  state.reservations[room] = { data: dataMap, loaded: true };
  renderSchedule();
}

function changeWeek(delta) {
  const d = new Date(state.date);
  d.setDate(d.getDate() + delta * 7);
  state.date = d;
  if (state.room) loadRoom(state.room);
}

    days.forEach(d => {
      const key = `${state.room}__${fmtDate(d)}__${h}`;

        cellClass += ' is-class';
        inner = `<div class="week-cell-dot dot-class"></div><div class="week-cell-label">${isMeal ? '식사' : '수업'}</div>`;
      } else if (rsv) {

// ── 복수 선택 모드 ──
function toggleSelectMode() {
  state.selectMode = !state.selectMode;
  if (state.selectMode) {
    // 취소 선택 모드 끄기
    state.cancelSelectMode = false;
    state.selectedCancelSlots.clear();
  } else {
    state.selectedSlots.clear();
  }
  removeMultiBar();
  renderSchedule();
}

function toggleCancelSelectMode() {
  state.cancelSelectMode = !state.cancelSelectMode;
  if (state.cancelSelectMode) {
    // 예약 선택 모드 끄기
    state.selectMode = false;
    state.selectedSlots.clear();
  } else {
    state.selectedCancelSlots.clear();
  }
  removeMultiBar();
  renderSchedule();
}

function handleCellClick(h, date) {
  if (!state.selectMode) {
    openReserveModal(h, date);
    return;
  }
  const key = `${fmtDate(date instanceof Date ? date : new Date(date))}__${h}`;
  if (state.selectedSlots.has(key)) {
    state.selectedSlots.delete(key);
  } else {
    state.selectedSlots.add(key);
  }
  renderSchedule();
  updateMultiBar();
}

function handleCancelCellClick(h, date) {
  if (!state.cancelSelectMode) {
    openCancelModal(h, date);
    return;
  }
  const key = `${fmtDate(date instanceof Date ? date : new Date(date))}__${h}`;
  if (state.selectedCancelSlots.has(key)) {
    state.selectedCancelSlots.delete(key);
  } else {
    state.selectedCancelSlots.add(key);
  }
  renderSchedule();
  updateMultiBar();
}

function updateMultiBar() {
  removeMultiBar();
  const bar = document.createElement('div');
  bar.id = 'multiBar';

  if (state.cancelSelectMode && state.selectedCancelSlots.size > 0) {
    bar.className = 'multi-bar cancel-bar';
    bar.innerHTML = `
      <div class="multi-bar-count" style="background:var(--danger)">${state.selectedCancelSlots.size}</div>
      <span>${state.selectedCancelSlots.size}개 예약 선택됨</span>
      <button class="multi-bar-btn multi-bar-confirm cancel-confirm" onclick="openMultiCancelModal()">취소하기</button>
      <button class="multi-bar-btn multi-bar-cancel" onclick="clearSelection()">선택 해제</button>
    `;
    document.body.appendChild(bar);
  } else if (state.selectMode && state.selectedSlots.size > 0) {
    bar.className = 'multi-bar';
    bar.innerHTML = `
      <div class="multi-bar-count">${state.selectedSlots.size}</div>
      <span>${state.selectedSlots.size}개 시간 선택됨</span>
      <button class="multi-bar-btn multi-bar-confirm" onclick="openMultiReserveModal()">예약하기</button>
      <button class="multi-bar-btn multi-bar-cancel" onclick="clearSelection()">선택 해제</button>
    `;
    document.body.appendChild(bar);
  }
}

function removeMultiBar() {
  const bar = document.getElementById('multiBar');
  if (bar) bar.remove();
}

function clearSelection() {
  state.selectedSlots.clear();
  state.selectedCancelSlots.clear();
  state.selectMode = false;
  state.cancelSelectMode = false;
  removeMultiBar();
  renderSchedule();
}

function openMultiReserveModal() {
  if (state.selectedSlots.size === 0) return;
  // Parse selected slots
  const slots = Array.from(state.selectedSlots).map(key => {
    const [dateStr, hourStr] = key.split('__');
    return { date: new Date(dateStr + 'T00:00:00'), hour: parseInt(hourStr) };
  }).sort((a, b) => a.date - b.date || a.hour - b.hour);
  openModal('multiReserve', { slots, repeatType: 'once' });
}

function openMultiCancelModal() {
  if (state.selectedCancelSlots.size === 0) return;
  const rsvData = state.reservations[state.room]?.data || {};
  const slots = Array.from(state.selectedCancelSlots).map(key => {
    const [dateStr, hourStr] = key.split('__');
    const d = new Date(dateStr + 'T00:00:00');
    const h = parseInt(hourStr);
    const rsv = rsvData[`${state.room}__${dateStr}__${h}`];
    return { date: d, hour: h, rsv };
  }).sort((a, b) => a.date - b.date || a.hour - b.hour);
  openModal('multiCancel', { slots });
}

// 반복 예약할 날짜 목록 생성
function getRepeatDates(startDate, repeatType) {
  const dates = [];
  const weeks = repeatType === 'month' ? 4 : repeatType === 'semester' ? 20 : 1;
  for (let i = 0; i < weeks; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i * 7);
    dates.push(d);
  }
  return dates;
}

async function doMultiReserve() {
  const slots = state.modalCtx.slots || [];
  const name = document.getElementById('ri_name').value.trim();
  const reason = document.getElementById('ri_reason').value.trim();
  const pw = document.getElementById('ri_pw').value;
  if (!name) { renderModal('이름을 입력해주세요.'); return; }
  if (!reason) { renderModal('예약 사유를 입력해주세요.'); return; }
  if (!pw) { renderModal('비밀번호를 입력해주세요.'); return; }

  const btn = document.getElementById('reserveBtn');
  btn.disabled = true;

  const repeatType = state.modalCtx.repeatType || 'once';
  const pwHash = btoa(unescape(encodeURIComponent(pw)));
  const rsvData = state.reservations[state.room]?.data || {};

  // 각 slot에 대해 반복 날짜 생성
  const allTasks = [];
  for (const slot of slots) {
    const dates = getRepeatDates(slot.date, repeatType);
    for (const d of dates) {
      allTasks.push({ date: d, hour: slot.hour });
    }
  }

  // 충돌 체크
  const conflicts = allTasks.filter(t => rsvData[`${state.room}__${fmtDate(t.date)}__${t.hour}`]);
  if (conflicts.length > 0) {
    const labels = conflicts.map(t => `${fmtDisplay(t.date)} ${String(t.hour).padStart(2,'0')}:00`).join(', ');
    renderModal(`이미 예약된 시간이 있습니다: ${labels}`);
    btn.disabled = false; return;
  }

  let successCount = 0;
  let lastErr = '';
  btn.textContent = `저장 중... (0/${allTasks.length})`;
  for (let i = 0; i < allTasks.length; i++) {
    btn.textContent = `저장 중... (${i+1}/${allTasks.length})`;
    const { date, hour } = allTasks[i];
    const ok = await sbInsert(state.room, date, hour, name, pwHash, reason);
    if (ok) successCount++;
    else lastErr = `${fmtDisplay(date)} ${String(hour).padStart(2,'0')}:00`;
  }

  await loadRoom(state.room);
  if (successCount === allTasks.length) {
    renderModal(`${allTasks.length}건 예약이 완료되었습니다! 🎉`, true);
  } else if (successCount === 0) {
    renderModal('저장에 실패했습니다. 브라우저 콘솔(F12)에서 오류를 확인해주세요.');
    btn.disabled = false; btn.textContent = `예약 확인 (${slots.length}건)`; return;
  } else {
    renderModal(`${successCount}/${allTasks.length}건 저장됐습니다. 실패: ${lastErr}`, true);
  }
  setTimeout(() => {
    closeModal();
    state.selectedSlots.clear();
    state.selectMode = false;
    removeMultiBar();
    renderSchedule();
  }, 1800);
}

async function doReserve(h, dateStr) {
  const startDate = new Date(dateStr + 'T00:00:00');
  const name = document.getElementById('ri_name').value.trim();
  const reason = document.getElementById('ri_reason').value.trim();
  const pw = document.getElementById('ri_pw').value;
  if (!name) { renderModal('이름을 입력해주세요.'); return; }
  if (!reason) { renderModal('예약 사유를 입력해주세요.'); return; }
  if (!pw) { renderModal('비밀번호를 입력해주세요.'); return; }
  const btn = document.getElementById('reserveBtn');
  btn.disabled = true;

  const repeatType = state.modalCtx.repeatType || 'once';
  const dates = getRepeatDates(startDate, repeatType);
  const pwHash = btoa(unescape(encodeURIComponent(pw)));
  const rsvData = state.reservations[state.room]?.data || {};

  // 충돌 체크
  const conflicts = dates.filter(d => rsvData[`${state.room}__${fmtDate(d)}__${h}`]);
  if (conflicts.length > 0) {
    const conflictDates = conflicts.map(d => fmtDisplay(d)).join(', ');
    renderModal(`이미 예약된 날짜가 있습니다: ${conflictDates}`);
    btn.disabled = false; return;
  }

  btn.textContent = `저장 중... (0/${dates.length})`;
  let successCount = 0;
  let lastErr = '';
  for (let i = 0; i < dates.length; i++) {
    btn.textContent = `저장 중... (${i+1}/${dates.length})`;
    const ok = await sbInsert(state.room, dates[i], h, name, pwHash, reason);
    if (ok) successCount++;
    else lastErr = fmtDisplay(dates[i]);
  }

  await loadRoom(state.room);
  if (successCount === dates.length) {
    const label = repeatType === 'once' ? '예약' : `${dates.length}주 반복 예약`;
    renderModal(`${label}이 완료되었습니다! 🎉`, true);
  } else if (successCount === 0) {
    renderModal(`저장에 실패했습니다. 브라우저 콘솔(F12)에서 오류를 확인해주세요.`);
    btn.disabled = false; btn.textContent = '예약 확인'; return;
  } else {
    renderModal(`${successCount}/${dates.length}건 저장됐습니다. 실패: ${lastErr}`, true);
  }
  setTimeout(() => { closeModal(); renderSchedule(); }, 1800);
}

async function doMultiCancel() {
  const slots = state.modalCtx.slots || [];
  const multiCancelScope = state.modalCtx.multiCancelScope || 'selected';
  const pw = document.getElementById('ci_pw').value;
  if (!pw) { renderModal('비밀번호를 입력하세요.'); return; }
  const pwHash = btoa(unescape(encodeURIComponent(pw)));

  const btn = document.getElementById('cancelBtn');
  btn.disabled = true;

  // 비밀번호 일치하는 슬롯만 필터
  const validSlots = slots.filter(s => s.rsv && s.rsv.pwHash === pwHash);
  const wrongPw = slots.length - validSlots.length;

  if (validSlots.length === 0) {
    renderModal('비밀번호가 일치하는 예약이 없습니다.');
    btn.disabled = false; return;
  }

  let targets = [];

  if (multiCancelScope === 'allSame') {
    // 각 유효 슬롯의 요일+시간 조합으로 DB 전체 조회 후 동일 이름+비번 필터
    btn.textContent = '조회 중...';
    const processedHours = new Set();
    for (const slot of validSlots) {
      const hourKey = `${slot.date.getDay()}__${slot.hour}`;
      if (processedHours.has(hourKey)) continue;
      processedHours.add(hourKey);
      const allRows = await sbGetReservationsByHour(state.room, slot.hour);
      if (!allRows) continue;
      const dow = slot.date.getDay();
      const matched = allRows.filter(r => {
        const rd = r.date.includes('T') ? new Date(r.date) : new Date(r.date + 'T00:00:00');
        return rd.getDay() === dow && r.name === slot.rsv.name && r.pw_hash === pwHash;
      });
      matched.forEach(r => targets.push({ date: r.date.includes('T') ? new Date(r.date) : new Date(r.date + 'T00:00:00'), hour: slot.hour }));
    }
    // 중복 제거
    const seen = new Set();
    targets = targets.filter(t => {
      const k = `${fmtDate(t.date)}__${t.hour}`;
      if (seen.has(k)) return false;
      seen.add(k); return true;
    });
  } else {
    targets = validSlots.map(s => ({ date: s.date, hour: s.hour }));
  }

  if (targets.length === 0) {
    renderModal('삭제할 예약을 찾을 수 없습니다.');
    btn.disabled = false; return;
  }

  let successCount = 0;
  btn.textContent = `삭제 중... (0/${targets.length})`;
  for (let i = 0; i < targets.length; i++) {
    btn.textContent = `삭제 중... (${i+1}/${targets.length})`;
    const ok = await sbDelete(state.room, targets[i].date, targets[i].hour);
    if (ok) successCount++;
  }

  await loadRoom(state.room);
  const extra = wrongPw > 0 ? ` (비밀번호 불일치 ${wrongPw}건 제외)` : '';
  renderModal(`${successCount}건 예약이 취소되었습니다. 🗑️${extra}`, true);
  setTimeout(() => {
    closeModal();
    state.selectedCancelSlots.clear();
    state.cancelSelectMode = false;
    removeMultiBar();
    renderSchedule();
  }, 1600);
}


// ===================== 엑셀 내보내기 (전체 학습실) =====================
async function exportAllToExcel() {
  const btn = document.querySelector('.excel-btn');
  const origText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span>⏳ 데이터 불러오는 중...</span>';

  const monday = getWeekMonday(state.date || new Date());
  const days = getWeekDays(monday);

  // 모든 층의 모든 방 목록
  const allRooms = Object.values(FLOORS).flat();

  const wb = XLSX.utils.book_new();

  // 공통 border 스타일
  const thinBorder = {
    top:    { style: 'thin', color: { rgb: 'E0E0D8' } },
    bottom: { style: 'thin', color: { rgb: 'E0E0D8' } },
    left:   { style: 'thin', color: { rgb: 'E0E0D8' } },
    right:  { style: 'thin', color: { rgb: 'E0E0D8' } }
  };

  for (const room of allRooms) {
    btn.innerHTML = `<span>⏳ ${room} 불러오는 중...</span>`;

    // 해당 방의 데이터가 없으면 Supabase에서 로드
    if (!state.reservations[room]?.loaded) {
      const dataMap = {};
      await Promise.all(days.map(async d => {
        const rows = await sbGetReservations(room, d);
        if (rows) rows.forEach(r => { dataMap[r.id] = { name: r.name, pwHash: r.pw_hash, reason: r.reason || '' }; });
      }));
      state.reservations[room] = { data: dataMap, loaded: true };
    }

    const rsvData = state.reservations[room]?.data || {};

    /*
     * 열 구성 (0-indexed):
     *   C=0 : 시간대  (3행씩 병합)
     *   C=1 : 행 레이블 (이름/부서 | 예약사유 | 비밀번호)
     *   C=2+ : 각 요일 데이터 (days[0]~days[6])
     *
     * 행 구성:
     *   R=0            : 헤더
     *   R=1, 2, 3      : HOURS[0]의 이름/부서 행, 예약사유 행, 비밀번호 행
     *   R=4, 5, 6      : HOURS[1]의 …
     *   …
     */

    // ── 헤더 행 ──
    const headerRow = ['시간대', '교시', '구분'];
    days.forEach(d => {
      const dayName = DAY_KO[d.getDay()];
      headerRow.push(`${d.getMonth()+1}/${d.getDate()} (${dayName})`);
    });

    const wsData = [headerRow];

    // ── 교시 매핑 ──
    const PERIOD_MAP = { 9:1, 10:2, 11:3, 12:4, 14:5, 15:6, 16:7 };

    // ── 시간대별 3행 데이터 ──
    HOURS.forEach(h => {
      const timeLabel = `${String(h).padStart(2,'0')}:00\n~\n${String(h+1).padStart(2,'0')}:00`;
      const periodNum = PERIOD_MAP[h];
      const periodLabel = periodNum ? `${periodNum}교시` : '';

      // 각 요일의 값을 미리 수집
      const dayValues = days.map(d => {
        const key = `${room}__${fmtDate(d)}__${h}`;
        const rsv = rsvData[key];
        const isClass = isClassHour(room, d, h);
        if (isClass) return { name: '수업', reason: '', pw: '', isClass: true, isRsv: false };
        if (rsv)     return { name: rsv.name || '', reason: rsv.reason || '', pw: '●●●●', isClass: false, isRsv: true };
        return { name: '', reason: '', pw: '', isClass: false, isRsv: false };
      });

      // 행1: 이름/부서 (C=0 시간대, C=1 교시, C=2 레이블, C=3+ 데이터)
      const nameRow = [timeLabel, periodLabel, '이름/부서'];
      dayValues.forEach(v => nameRow.push(v.isClass ? '수업' : v.name));
      wsData.push(nameRow);

      // 행2: 예약사유
      const reasonRow = ['', '', '예약사유(수업)'];
      dayValues.forEach(v => reasonRow.push(v.isClass ? '' : v.reason));
      wsData.push(reasonRow);

      // 행3: 비밀번호
      const pwRow = ['', '', '비밀번호'];
      dayValues.forEach(v => pwRow.push(v.isClass ? '' : v.pw));
      wsData.push(pwRow);
    });

    const ws = XLSX.utils.aoa_to_sheet(wsData);

    // ── 열 너비 설정 ──
    // C0: 시간대, C1: 교시, C2: 구분 레이블, C3+: 요일
    ws['!cols'] = [
      { wch: 13 },  // 시간대
      { wch: 8  },  // 교시
      { wch: 13 },  // 구분
      ...days.map(() => ({ wch: 18 }))
    ];

    const totalRows = wsData.length;
    const totalCols = headerRow.length;

    // ── 시간대(C=0) + 교시(C=1) 열 병합 (3행씩) ──
    ws['!merges'] = ws['!merges'] || [];
    HOURS.forEach((h, idx) => {
      const startRow = 1 + idx * 3; // 0-indexed, 헤더는 R=0
      // 시간대 병합
      ws['!merges'].push({ s: { r: startRow, c: 0 }, e: { r: startRow + 2, c: 0 } });
      // 교시 병합
      ws['!merges'].push({ s: { r: startRow, c: 1 }, e: { r: startRow + 2, c: 1 } });
    });

    // ── 스타일 적용 ──
    // 1) 헤더 행
    for (let C = 0; C < totalCols; C++) {
      const addr = XLSX.utils.encode_cell({ r: 0, c: C });
      if (!ws[addr]) ws[addr] = { t: 's', v: '' };
      ws[addr].s = {
        font: { bold: true, color: { rgb: 'FFFFFF' } },
        fill: { fgColor: { rgb: 'E24329' } },
        alignment: { horizontal: 'center', vertical: 'center' },
        border: {
          top:    { style: 'thin', color: { rgb: 'CCCCCC' } },
          bottom: { style: 'thin', color: { rgb: 'CCCCCC' } },
          left:   { style: 'thin', color: { rgb: 'CCCCCC' } },
          right:  { style: 'thin', color: { rgb: 'CCCCCC' } }
        }
      };
    }

    // 2) 데이터 행
    HOURS.forEach((h, idx) => {
      const baseR = 1 + idx * 3;
      const subLabels = ['이름/부서', '예약사유(수업)', '비밀번호'];

      for (let sub = 0; sub < 3; sub++) {
        const R = baseR + sub;

        // C=0 시간대 셀 (병합된 첫 행만 값 기록, 나머지는 빈 셀로 스타일만)
        const timeAddr = XLSX.utils.encode_cell({ r: R, c: 0 });
        if (!ws[timeAddr]) ws[timeAddr] = { t: 's', v: '' };
        ws[timeAddr].s = {
          font: { bold: true, sz: 10, color: { rgb: '444440' } },
          fill: { fgColor: { rgb: 'F0EFE9' } },
          alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
          border: thinBorder
        };

        // C=1 교시 셀 (병합된 첫 행만 스타일, 나머지는 빈 셀)
        const periodAddr = XLSX.utils.encode_cell({ r: R, c: 1 });
        if (!ws[periodAddr]) ws[periodAddr] = { t: 's', v: '' };
        const periodNum2 = PERIOD_MAP[h];
        ws[periodAddr].s = {
          font: { bold: true, sz: 11, color: { rgb: periodNum2 ? 'B03A2E' : '9E9D97' } },
          fill: { fgColor: { rgb: 'FDF0EE' } },
          alignment: { horizontal: 'center', vertical: 'center' },
          border: thinBorder
        };

        // C=2 레이블 셀
        const labelAddr = XLSX.utils.encode_cell({ r: R, c: 2 });
        if (!ws[labelAddr]) ws[labelAddr] = { t: 's', v: subLabels[sub] };
        const labelColors = [
          { fill: 'EBF5FB', font: '1A5276' }, // 이름/부서: 파란 계열
          { fill: 'EAFAF1', font: '1E8449' }, // 예약사유: 초록 계열
          { fill: 'FDF2F8', font: '7D3C98' }  // 비밀번호: 보라 계열
        ];
        ws[labelAddr].s = {
          font: { bold: true, sz: 9, color: { rgb: labelColors[sub].font } },
          fill: { fgColor: { rgb: labelColors[sub].fill } },
          alignment: { horizontal: 'center', vertical: 'center' },
          border: thinBorder
        };

        // C=3+ 요일 데이터 셀
        for (let C = 3; C < totalCols; C++) {
          const addr = XLSX.utils.encode_cell({ r: R, c: C });
          if (!ws[addr]) ws[addr] = { t: 's', v: '' };
          const val = ws[addr].v;

          let fillColor = 'FFFFFF', fontColor = '1A1A18';
          // 이름/부서 행에서 '수업'인 경우
          if (sub === 0 && val === '수업') { fillColor = 'EEF2FF'; fontColor = '4338CA'; }
          // 이름/부서 행에서 예약자 있는 경우
          else if (sub === 0 && val)       { fillColor = 'FDF4E7'; fontColor = 'C47C10'; }
          // 예약사유 행 (값 있는 경우 동일 색조)
          else if (sub === 1 && val)       { fillColor = 'FFFBF0'; fontColor = 'C47C10'; }
          // 비밀번호 행 (값 있는 경우)
          else if (sub === 2 && val)       { fillColor = 'FFFBF0'; fontColor = 'AAAAAA'; }

          // 수업인 셀은 예약사유/비밀번호 행도 동일한 수업 스타일 유지
          // (이름/부서 행에서 수업이면 아래 두 행도 같은 배경)
          // → 해당 날짜의 isClass 여부를 다시 체크
          const dayIdx = C - 3;
          const d = days[dayIdx];
          const isClass = d ? isClassHour(room, d, h) : false;
          if (isClass && sub !== 0) { fillColor = 'EEF2FF'; }

          ws[addr].s = {
            font: { sz: 10, color: { rgb: fontColor } },
            fill: { fgColor: { rgb: fillColor } },
            alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
            border: thinBorder
          };
        }
      }
    });

    // ── 행 높이 ──
    ws['!rows'] = [{ hpt: 28 }]; // 헤더
    HOURS.forEach((h, idx) => {
      const baseR = 1 + idx * 3;
      ws['!rows'][baseR]     = { hpt: 24 }; // 이름/부서
      ws['!rows'][baseR + 1] = { hpt: 20 }; // 예약사유
      ws['!rows'][baseR + 2] = { hpt: 20 }; // 비밀번호
    });

    // 시트 이름은 31자 이내여야 함 (Excel 제한)
    const sheetName = room.length > 31 ? room.slice(0, 31) : room;
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  }

  // 파일명: 주간 날짜 범위 포함
  const startLabel = `${monday.getFullYear()}${String(monday.getMonth()+1).padStart(2,'0')}${String(monday.getDate()).padStart(2,'0')}`;
  const endDate = days[6];
  const endLabel = `${endDate.getFullYear()}${String(endDate.getMonth()+1).padStart(2,'0')}${String(endDate.getDate()).padStart(2,'0')}`;
  const fileName = `GGCJ_특별실예약현황_${startLabel}-${endLabel}.xlsx`;

  XLSX.writeFile(wb, fileName, { bookType: 'xlsx', type: 'binary' });

  btn.disabled = false;
  btn.innerHTML = origText;
}

// ===================== 엑셀 불러오기 =====================

function parseCellValue(val) {
  if (!val || val === '수업') return null;
  const str = String(val).trim();
  if (!str) return null;
  const m = str.match(/^(.+?)\s*\((.+)\)$/);
  if (m) return { name: m[1].trim(), reason: m[2].trim() };
  return { name: str, reason: '' };
}

function parseHeaderDate(header, referenceYear) {
  const m = String(header).match(/(\d+)\/(\d+)/);
  if (!m) return null;
  const month = parseInt(m[1]), day = parseInt(m[2]);
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  // 후보 연도 중 현재 날짜에 가장 가까운 날짜를 선택
  let best = null, bestDiff = Infinity;
  for (let y = referenceYear - 1; y <= referenceYear + 1; y++) {
    const d = new Date(y, month - 1, day);
    d.setHours(0, 0, 0, 0);
    const diff = Math.abs(d - now);
    if (diff < bestDiff) { bestDiff = diff; best = d; }
  }
  return best || new Date(referenceYear, month - 1, day);
}

function parseTimeLabel(label) {
  const m = String(label).match(/^(\d+):/);
  return m ? parseInt(m[1]) : null;
}

async function handleExcelImport(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;

  const REPEAT_WEEKS = 20; // 5개월
  const allRooms = Object.values(FLOORS).flat();
  const data = await file.arrayBuffer();
  let wb;
  try { wb = XLSX.read(data, { type: 'array' }); }
  catch(e) { alert('엑셀 파일을 읽을 수 없습니다.'); return; }

  const refYear = new Date().getFullYear();

  // 1단계: 엑셀에서 기준 주간(1주치) 슬롯 파싱
  // baseSlots: { room: [ {date, hour, name, reason} ] }  — 예약 있는 셀만
  const baseSlots = {};

  for (const sheetName of wb.SheetNames) {
    const room = allRooms.find(r => r === sheetName || sheetName.startsWith(r) || r.startsWith(sheetName));
    if (!room) continue;
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    if (!rows || rows.length < 2) continue;

    const headerRow = rows[0];
    const colDates = [];
    for (let c = 1; c < headerRow.length; c++) {
      colDates[c] = parseHeaderDate(headerRow[c], refYear);
    }

    baseSlots[room] = [];

    // 새 형식(3행/시간대) 또는 구형식(1행/시간대) 자동 감지
    // 구분 열(C=2)에 '이름/부서' 텍스트가 있으면 새 형식
    const isNewFormat = rows.length > 1 && String(rows[1][2] || '').trim() === '이름/부서';

    if (isNewFormat) {
      // 새 형식: C=0 시간대, C=1 교시, C=2 구분 레이블, C=3+ 요일
      const colDatesNew = [];
      for (let c = 3; c < headerRow.length; c++) {
        colDatesNew[c] = parseHeaderDate(headerRow[c], refYear);
      }

      let r = 1;
      while (r < rows.length) {
        const nameRow   = rows[r]     || [];
        const reasonRow = rows[r + 1] || [];
        const pwRow     = rows[r + 2] || [];

        let timeLabel = String(nameRow[0] || '').trim();
        if (!timeLabel) { r += 3; continue; }

        const hourMatch = timeLabel.match(/^(\d+)/);
        const hour = hourMatch ? parseInt(hourMatch[1]) : null;
        if (hour === null) { r += 3; continue; }

        for (let c = 3; c < nameRow.length; c++) {
          const date = colDatesNew[c];
          if (!date) continue;
          const name   = String(nameRow[c]   || '').trim();
          const reason = String(reasonRow[c] || '').trim();
          const pwRaw  = String(pwRow[c]     || '').trim();
          // 비밀번호: 실제 값이 있고 마스킹(●)이 아니면 사용, 아니면 기본값 1234
          const pw = (pwRaw && !pwRaw.includes('●')) ? pwRaw : '1234';
          if (name && name !== '수업') {
            baseSlots[room].push({ date, hour, name, reason, pw });
          }
        }
        r += 3;
      }
    } else {
      // 구형식: C=0 시간대, C=1+ 요일
      for (let r = 1; r < rows.length; r++) {
        const row = rows[r];
        const hour = parseTimeLabel(row[0]);
        if (hour === null) continue;
        for (let c = 1; c < row.length; c++) {
          const date = colDates[c];
          if (!date) continue;
          const parsed = parseCellValue(row[c]);
          if (parsed) {
            // 예약 있는 셀만 저장 (빈 셀은 무시 — 5개월 추가 대상 아님)
            baseSlots[room].push({ date, hour, name: parsed.name, reason: parsed.reason, pw: '1234' });
          }
        }
      }
    }
  }

  if (Object.keys(baseSlots).length === 0) {
    alert('파일에서 인식 가능한 학습실 시트를 찾을 수 없습니다.\n시트 이름이 학습실 이름과 일치해야 합니다.');
    return;
  }

  // 2단계: 엑셀 기준 주(week 0)에 이미 DB에 예약이 존재하는 슬롯을 먼저 확인
  // → 기준 주에 이미 예약된 시간대는 20주 확장 대상에서 완전히 제외
  // baseDateStrs: room별 기준 주의 날짜 문자열 목록
  const baseExistingIds = new Set();
  for (const room of Object.keys(baseSlots)) {
    const baseDateStrs = new Set(baseSlots[room].map(slot => fmtDate(slot.date)));
    await Promise.all([...baseDateStrs].map(async dateStr => {
      const url = `${SUPABASE_URL}/rest/v1/reservations?room=eq.${encodeURIComponent(room)}&date=eq.${dateStr}&select=id`;
      try {
        const r = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
        if (r.ok) {
          const rows = await r.json();
          rows.forEach(row => baseExistingIds.add(row.id));
        }
      } catch(e) { console.error('DB 조회 오류 (기준 주):', e); }
    }));
  }

  // 기준 주에 이미 예약된 슬롯은 제외한 baseSlots만 남김
  // (기준 주 날짜·시간이 DB에 이미 있는 경우 → 20주 확장 대상 아님)
  const filteredBaseSlots = {};
  for (const room of Object.keys(baseSlots)) {
    filteredBaseSlots[room] = baseSlots[room].filter(slot => {
      const id = `${room}__${fmtDate(slot.date)}__${slot.hour}`;
      return !baseExistingIds.has(id);
    });
  }

  // 3단계: 필터링된 슬롯만 20주(5개월) 확장
  // expandedSlots: { room: { 'YYYY-MM-DD__H': {name, reason} } }
  const expandedSlots = {};
  for (const room of Object.keys(filteredBaseSlots)) {
    expandedSlots[room] = {};
    for (const slot of filteredBaseSlots[room]) {
      for (let w = 0; w < REPEAT_WEEKS; w++) {
        const d = new Date(slot.date);
        d.setDate(d.getDate() + w * 7);
        const key = `${fmtDate(d)}__${slot.hour}`;
        expandedSlots[room][key] = { name: slot.name, reason: slot.reason, pw: slot.pw || '1234', baseDate: slot.date, hour: slot.hour };
      }
    }
  }

  // 4단계: 확장된 슬롯 중 DB에 없는 것만 추가 대상
  // (기준 주에 없었던 예약이 확장 주차에 이미 있는 경우도 제외)
  const expandedExistingIds = new Set();
  for (const room of Object.keys(expandedSlots)) {
    const roomDateStrs = new Set();
    for (const key of Object.keys(expandedSlots[room])) {
      roomDateStrs.add(key.split('__')[0]);
    }
    await Promise.all([...roomDateStrs].map(async dateStr => {
      const url = `${SUPABASE_URL}/rest/v1/reservations?room=eq.${encodeURIComponent(room)}&date=eq.${dateStr}&select=id`;
      try {
        const r = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
        if (r.ok) {
          const rows = await r.json();
          rows.forEach(row => expandedExistingIds.add(row.id));
        }
      } catch(e) { console.error('DB 조회 오류 (확장 주):', e); }
    }));
  }

  // 5단계: 차이 계산 — 확장 슬롯 중 DB에 없는 것만 toAdd
  const toAdd = [], toDelete = [];
  for (const room of Object.keys(expandedSlots)) {
    const exRoom = expandedSlots[room];
    for (const key of Object.keys(exRoom)) {
      const [dateStr, hourStr] = key.split('__');
      const hour = parseInt(hourStr);
      const date = new Date(dateStr + 'T00:00:00');
      const exVal = exRoom[key];
      const id = `${room}__${dateStr}__${hour}`;
      if (isClassHour(room, date, hour)) continue;
      // DB에 동일 id가 이미 존재하면 건너뜀
      if (expandedExistingIds.has(id)) continue;
      toAdd.push({ room, date, hour, name: exVal.name, reason: exVal.reason, pw: exVal.pw || '1234' });
    }
  }

  if (toAdd.length === 0 && toDelete.length === 0) {
    alert('추가할 예약이 없습니다.\n엑셀의 모든 시간대에 이미 예약이 존재합니다.');
    return;
  }

  showImportPreviewModal(toAdd, toDelete, REPEAT_WEEKS);
}

  const box = document.getElementById('modalBox');
  backdrop.style.display = 'flex';

  const fmtSlot = item => `${item.room} · ${fmtDisplay(item.date)} ${String(item.hour).padStart(2,'0')}:00`;

  // 미리보기는 최대 30건만 표시 (너무 많아지면 스크롤 불편)
  const MAX_PREVIEW = 30;
  const addPreview = toAdd.slice(0, MAX_PREVIEW);
  const delPreview = toDelete.slice(0, MAX_PREVIEW);

  const addHtml = toAdd.length === 0 ? '<p style="color:var(--text3);font-size:12px">없음</p>' :
    addPreview.map(a => `<div style="display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)">
      <span style="color:#16a34a;font-weight:700;flex-shrink:0">＋</span>
      <span style="font-size:11px;line-height:1.5"><b>${fmtSlot(a)}</b>
      &nbsp;<span style="color:var(--text2)">${a.name}${a.reason ? ' (' + a.reason + ')' : ''}</span></span>
    </div>`).join('') + (toAdd.length > MAX_PREVIEW ? `<p style="font-size:11px;color:var(--text3);margin-top:4px">… 외 ${toAdd.length - MAX_PREVIEW}건</p>` : '');

  const delHtml = toDelete.length === 0 ? '<p style="color:var(--text3);font-size:12px">없음</p>' :
    delPreview.map(d => `<div style="display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)">
      <span style="color:var(--danger);font-weight:700;flex-shrink:0">－</span>
      <span style="font-size:11px;line-height:1.5"><b>${fmtSlot(d)}</b>
      &nbsp;<span style="color:var(--text2)">${d.name}</span></span>
    </div>`).join('') + (toDelete.length > MAX_PREVIEW ? `<p style="font-size:11px;color:var(--text3);margin-top:4px">… 외 ${toDelete.length - MAX_PREVIEW}건</p>` : '');

  box.innerHTML = `
    <div class="modal-title">📥 엑셀 불러오기 — 변경 미리보기</div>
    <div style="font-size:12px;color:var(--text2);background:var(--surface2);border-radius:var(--radius-sm);padding:7px 10px;margin-bottom:12px;line-height:1.6">
      엑셀 기준 주에 <b>이미 예약된 시간대는 제외</b>하고, 신규 예약만 <b>${repeatWeeks}주(5개월)</b> 반복 등록합니다.<br>
      새로 추가되는 예약의 취소 비밀번호는 <b>엑셀에 입력된 비밀번호</b>로 설정됩니다 (비밀번호 칸이 비어 있으면 <b>1234</b>로 설정).
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <div style="flex:1;background:var(--success-bg);border-radius:var(--radius-sm);padding:6px 10px;text-align:center">
        <div style="font-size:11px;color:var(--success);font-weight:700">추가</div>
        <div style="font-size:20px;font-weight:700;color:var(--success)">${toAdd.length}건</div>
      </div>
      <div style="flex:1;background:var(--danger-bg);border-radius:var(--radius-sm);padding:6px 10px;text-align:center">
        <div style="font-size:11px;color:var(--danger);font-weight:700">수정·삭제</div>
        <div style="font-size:20px;font-weight:700;color:var(--danger)">${toDelete.length}건</div>
      </div>
    </div>
    <div style="max-height:220px;overflow-y:auto;margin-bottom:12px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px">
      <div style="font-size:11px;font-weight:700;color:var(--success);margin-bottom:4px">추가될 예약</div>
      ${addHtml}
      <div style="font-size:11px;font-weight:700;color:var(--danger);margin-top:10px;margin-bottom:4px">삭제될 예약</div>
      ${delHtml}
    </div>
    <div id="importAlert"></div>
    <div class="modal-btns">
      <button class="btn-primary" id="importConfirmBtn" onclick="doImportApply()">반영하기 (총 ${toAdd.length + toDelete.length}건)</button>
      <button class="btn-secondary" onclick="closeModal()">취소</button>
    </div>`;

  window._importPending = { toAdd, toDelete };
}

async function doImportApply() {
  const { toAdd, toDelete } = window._importPending || {};
  if (!toAdd && !toDelete) return;
  const btn = document.getElementById('importConfirmBtn');
  btn.disabled = true;

  let doneCount = 0;
  const total = toAdd.length + toDelete.length;

  for (let i = 0; i < toDelete.length; i++) {
    btn.textContent = `삭제 중... (${doneCount + 1}/${total})`;
    await sbDelete(toDelete[i].room, toDelete[i].date, toDelete[i].hour);
    doneCount++;
  }
  for (let i = 0; i < toAdd.length; i++) {
    btn.textContent = `추가 중... (${doneCount + 1}/${total})`;
    const itemPw = toAdd[i].pw || '1234';
    const itemPwHash = btoa(unescape(encodeURIComponent(itemPw)));
    // sbInsert에 resolution=ignore-duplicates가 설정되어 있어
    // DB에 동일 id(PK)가 이미 존재하면 서버 측에서 자동으로 무시함
    await sbInsert(toAdd[i].room, toAdd[i].date, toAdd[i].hour, toAdd[i].name, itemPwHash, toAdd[i].reason);
    doneCount++;
  }

  const changedRooms = new Set([...toAdd.map(a => a.room), ...toDelete.map(d => d.room)]);
  changedRooms.forEach(r => { if (state.reservations[r]) state.reservations[r].loaded = false; });
  if (state.room && changedRooms.has(state.room)) await loadRoom(state.room);

  const alertEl = document.getElementById('importAlert');
  if (alertEl) alertEl.innerHTML = `<div class="alert alert-success">✅ 총 ${total}건 반영 완료!</div>`;
  btn.textContent = '완료';
  setTimeout(() => closeModal(), 1500);
  window._importPending = null;
}

async function doCancel(h, dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const pw = document.getElementById('ci_pw').value;
  if (!pw) { renderModal('비밀번호를 입력하세요.'); return; }
  const key = `${state.room}__${fmtDate(d)}__${h}`;
  const rsvData = state.reservations[state.room]?.data || {};
  const rsv = rsvData[key];
  if (!rsv) { renderModal('예약 정보를 찾을 수 없습니다.'); return; }
  const pwHash = btoa(unescape(encodeURIComponent(pw)));
  if (pwHash !== rsv.pwHash) { renderModal('비밀번호가 일치하지 않습니다.'); return; }

  const btn = document.getElementById('cancelBtn');
  btn.disabled = true; btn.textContent = '처리 중...';

  const cancelScope = state.modalCtx.cancelScope || 'single';

  if (cancelScope === 'single') {
    // 단건 삭제
    const ok = await sbDelete(state.room, d, h);
    if (ok) {
      await loadRoom(state.room);
      renderModal('예약이 취소되었습니다.', true);
      setTimeout(() => { closeModal(); renderSchedule(); }, 1300);
    } else {
      renderModal('삭제에 실패했습니다. 다시 시도해주세요.');
      btn.disabled = false; btn.textContent = '취소 확인';
    }
  } else {
    // 동일 요일·시간대의 동일 이름 전체 삭제
    btn.textContent = '조회 중...';
    const allRows = await sbGetReservationsByHour(state.room, h);
    if (!allRows) {
      renderModal('예약 목록 조회에 실패했습니다.');
      btn.disabled = false; btn.textContent = '취소 확인'; return;
    }
    const targetDow = d.getDay(); // 같은 요일만
    const targets = allRows.filter(r => {
      const rd = r.date.includes('T') ? new Date(r.date) : new Date(r.date + 'T00:00:00');
      return rd.getDay() === targetDow && r.name === rsv.name && r.pw_hash === rsv.pwHash;
    });
    if (targets.length === 0) {
      renderModal('삭제할 예약을 찾을 수 없습니다.');
      btn.disabled = false; btn.textContent = '취소 확인'; return;
    }
    let successCount = 0;
    btn.textContent = `삭제 중... (0/${targets.length})`;
    for (let i = 0; i < targets.length; i++) {
      btn.textContent = `삭제 중... (${i+1}/${targets.length})`;
      const rd = targets[i].date.includes('T') ? new Date(targets[i].date) : new Date(targets[i].date + 'T00:00:00');
      const ok = await sbDelete(state.room, rd, h);
      if (ok) successCount++;
    }
    await loadRoom(state.room);
    if (successCount === targets.length) {
      renderModal(`${successCount}건 예약이 모두 취소되었습니다. 🗑️`, true);
    } else {
      renderModal(`${successCount}/${targets.length}건 취소됐습니다.`, true);
    }
    setTimeout(() => { closeModal(); renderSchedule(); }, 1500);
  }
}
</script>
</body>
</html>
